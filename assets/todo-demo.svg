<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Simple To-Do App Demo</title>
  <desc id="desc">A visual preview of the To-Do app interface with an input field, add button, and task list.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8e2ff"/>
      <stop offset="100%" stop-color="#fdf2d4"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1f2a44" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="145" cy="126" r="72" fill="#ffffff" opacity="0.45"/>
  <circle cx="1060" cy="590" r="98" fill="#ffffff" opacity="0.30"/>

  <text x="600" y="92" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#1d2740">
    Simple To-Do App Demo
  </text>
  <text x="600" y="130" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#536179">
    Visual preview for the README demo section
  </text>

  <g filter="url(#shadow)">
    <rect x="255" y="170" width="690" height="415" rx="28" fill="#ffffff"/>
  </g>

  <text x="600" y="240" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#222b45">
    My To-Do List
  </text>
  <text x="670" y="240" font-family="Segoe UI Emoji, Segoe UI, Arial, sans-serif" font-size="32">📝</text>

  <rect x="320" y="282" width="410" height="58" rx="14" fill="#f6f8fc" stroke="#cdd6ea"/>
  <text x="345" y="317" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7a869f">
    Enter the task...
  </text>

  <rect x="750" y="282" width="130" height="58" rx="14" fill="#28a745"/>
  <text x="815" y="317" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">
    Add Task
  </text>

  <g>
    <rect x="320" y="382" width="560" height="62" rx="16" fill="#f8fafc" stroke="#dde4f2"/>
    <rect x="320" y="382" width="12" height="62" rx="6" fill="#1976d2"/>
    <text x="353" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#29344d">
      Finish landing page layout
    </text>
    <rect x="760" y="395" width="96" height="36" rx="10" fill="#dc3545"/>
    <text x="808" y="418" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">
      Delete
    </text>
  </g>

  <g>
    <rect x="320" y="460" width="560" height="62" rx="16" fill="#f8fafc" stroke="#dde4f2"/>
    <rect x="320" y="460" width="12" height="62" rx="6" fill="#1976d2"/>
    <text x="353" y="498" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#29344d">
      Review JavaScript validation flow
    </text>
    <rect x="760" y="473" width="96" height="36" rx="10" fill="#dc3545"/>
    <text x="808" y="496" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">
      Delete
    </text>
  </g>

  <g>
    <rect x="58" y="580" width="300" height="94" rx="22" fill="#ffffff" opacity="0.88"/>
    <text x="88" y="618" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#24304b">
      Demo Highlights
    </text>
    <text x="88" y="648" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#536179">
      Add, validate, and delete tasks
    </text>
  </g>
</svg>
