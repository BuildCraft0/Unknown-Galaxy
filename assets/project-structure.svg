<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Project Structure Flowchart</title>
  <desc id="desc">A flowchart showing the folder and file structure of the Simple To-Do App project.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#47577d"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="600" y="72" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700" fill="#24304b">
    Project Structure Flowchart
  </text>
  <text x="600" y="108" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#5d6a83">
    File-level overview of the Simple To-Do App repository
  </text>

  <g font-family="Segoe UI, Arial, sans-serif" fill="#24304b">
    <rect x="455" y="150" width="290" height="72" rx="22" fill="#ffffff" stroke="#ccd5ea" stroke-width="2"/>
    <text x="600" y="194" text-anchor="middle" font-size="24" font-weight="700">Unknown-Galaxy</text>

    <rect x="90" y="310" width="245" height="82" rx="20" fill="#ffffff" stroke="#ccd5ea" stroke-width="2"/>
    <text x="212" y="350" text-anchor="middle" font-size="24" font-weight="700">index.html</text>
    <text x="212" y="376" text-anchor="middle" font-size="16" fill="#5d6a83">Structure and inline JS</text>

    <rect x="372" y="310" width="245" height="82" rx="20" fill="#ffffff" stroke="#ccd5ea" stroke-width="2"/>
    <text x="494" y="350" text-anchor="middle" font-size="24" font-weight="700">style.css</text>
    <text x="494" y="376" text-anchor="middle" font-size="16" fill="#5d6a83">Colors, layout, buttons</text>

    <rect x="654" y="310" width="245" height="82" rx="20" fill="#ffffff" stroke="#ccd5ea" stroke-width="2"/>
    <text x="776" y="350" text-anchor="middle" font-size="24" font-weight="700">README.md</text>
    <text x="776" y="376" text-anchor="middle" font-size="16" fill="#5d6a83">Project documentation</text>

    <rect x="936" y="310" width="180" height="82" rx="20" fill="#ffffff" stroke="#ccd5ea" stroke-width="2"/>
    <text x="1026" y="350" text-anchor="middle" font-size="24" font-weight="700">assets/</text>
    <text x="1026" y="376" text-anchor="middle" font-size="16" fill="#5d6a83">README visuals</text>

    <rect x="880" y="500" width="292" height="64" rx="18" fill="#f8fbff" stroke="#ccd5ea" stroke-width="2"/>
    <text x="1026" y="540" text-anchor="middle" font-size="20">todo-demo.svg</text>

    <rect x="880" y="590" width="292" height="64" rx="18" fill="#f8fbff" stroke="#ccd5ea" stroke-width="2"/>
    <text x="1026" y="630" text-anchor="middle" font-size="20">todo-flow.svg</text>

    <rect x="880" y="680" width="292" height="64" rx="18" fill="#f8fbff" stroke="#ccd5ea" stroke-width="2"/>
    <text x="1026" y="720" text-anchor="middle" font-size="20">project-structure.svg</text>
  </g>

  <line x1="600" y1="222" x2="212" y2="310" stroke="#47577d" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="600" y1="222" x2="494" y2="310" stroke="#47577d" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="600" y1="222" x2="776" y2="310" stroke="#47577d" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="600" y1="222" x2="1026" y2="310" stroke="#47577d" stroke-width="4" marker-end="url(#arrow)"/>

  <line x1="1026" y1="392" x2="1026" y2="500" stroke="#47577d" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1026" y1="564" x2="1026" y2="590" stroke="#47577d" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1026" y1="654" x2="1026" y2="680" stroke="#47577d" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
